spring.application.name=poolai
server.port=8081

# Database — override with env vars in production
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/my_database}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:@anushri2601}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false

# Connection pool tuning
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# JWT — override secret in production
jwt.secret=${JWT_SECRET:PoolAI2024SuperSecretKeyForJWTTokenGenerationMustBe256BitsLong!}
jwt.expiration=86400000

# No Thymeleaf
spring.thymeleaf.enabled=false

# Logging
logging.level.org.springframework=WARN
logging.level.com.example=INFO

# Scheduling enabled
spring.task.scheduling.enabled=true

# Jackson: don't serialize null fields
spring.jackson.default-property-inclusion=non_null
